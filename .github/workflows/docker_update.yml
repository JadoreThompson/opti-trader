name: Update Docker Image
run-name: ${{ github.actor }} pushed content to be updated in docker image
on:
  push:
    branches: [release]

jobs:
  Update-Docker-Image:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get latest tag
        run: |
          git fetch --tags
          echo "LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)" >> $GITHUB_ENV

      - name: Build docker image
        run: |
          docker build --no-cache \
            -t zeznjt/order-matcher-backend-api:latest \
            -t zeznjt/order-matcher-backend-api:${LATEST_TAG} .
      
      - name: Push Image
        run: docker push --all-tags zeznjt/order-matcher-backend-api
        